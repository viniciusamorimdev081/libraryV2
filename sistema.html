<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de biblioteca</title>
    <!--IMPORTAÇÃO DO ESTILO CSS DO SISTEMA-->
    <link rel="stylesheet" href="css/style.css">
    <!--IMPORTAÇÃO DA BIBLIOTECA DE ICONES BOOTSTRAP-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!--IMPORTAÇÃO DA BIBLIOTECA DE GRAFICOS CHART.JS-->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!--ICON THE TITLE-->
    <link rel="icon" href="img/logo.png">
</head>
<body>
    <!--DIV QUE VAI SEGURAR TODO CONTEUDO PRINCIPAL DO SISTEMA-->
    <div class="container-principal">
        <!--ESTRUTURA DO MENU LATERAL DA VERSÃO DESKTOP-->
        <aside id="menu-lateral-desktop">
            <div id="logo-menu-principal"><img src="img/logo.png" alt="" width="150"></div>
            <nav>
                <ul>
                    <li id="menuDashboard" class="menu-selecionado"><i class="bi bi-speedometer2"></i>Dashboard</li>
                    <li id="menuLivros"><i class="bi bi-book-half"></i>Livros</li>
                    <li id="menuClientes"><i class="bi bi-people-fill"></i>Clientes</li>
                    <li id="menuConfiguracao"><i class="bi bi-gear-fill"></i>Configurações</li>
                    <li id="menuSair"><i class="bi bi-box-arrow-left"></i>Sair</li>
                </ul>
            </nav>
        </aside>
        <!--TELA CORRESPONDENTE A CADA MENU DO SISTEMA-->
        <main>
            <!--TELA DE DASHBOARS-->
            <section id="telaDashboard">
                <!--PARTE SUPERIOR DO DASHBOARD (TITULO)-->
                <div class="top-dashboard">
                    <div>Library | Gerenciamento de Biblioteca</div>
                    <div class="btns-top-dashboard">
                        <button>+ Novo Livro</button>
                        <button>+ Novo Cliente</button>
                        <button onclick="">Atualizar</button>
                    </div>
                    
                </div>
                <!--DIV DE CONTAINER DOS CARDS DA PRIMEIRA LINHA-->
                <div class="grid-cards-dashboard">
                    <!-------CARD------->
                    <div class="card-dashboard">
                        <div class="icon-card-dashboard">
                            <i class="bi bi-journal-text"></i>
                        </div>

                        <div class="info-card-dashboard">
                            <span class="title-info-card">Livros cadastrado</span>
                            <span class="number-card">0</span>
                        </div>
                    </div>
                    <!-------CARD------->
                    <div class="card-dashboard">
                        <div class="icon-card-dashboard">
                            <i class="bi bi-person-check"></i>
                        </div>

                        <div class="info-card-dashboard">
                            <span class="title-info-card">Livros alugados</span>
                            <span class="number-card">0</span>
                        </div>
                    </div>
                    <!-------CARD------->
                    <div class="card-dashboard">
                        <div class="icon-card-dashboard">
                            <i class="bi bi-box-seam"></i>
                        </div>

                        <div class="info-card-dashboard">
                            <span class="title-info-card">Livros disponiveis</span>
                            <span class="number-card">0</span>
                        </div>
                    </div>
                    <!-------CARD------->
                    <div class="card-dashboard">
                        <div class="icon-card-dashboard">
                            <i class="bi bi-person-vcard"></i>
                        </div>

                        <div class="info-card-dashboard">
                            <span class="title-info-card">Clientes cadastrado</span>
                            <span class="number-card">0</span>
                        </div>
                    </div>
                    <!-------CARD------->
                    <div class="card-dashboard">
                        <div class="icon-card-dashboard">
                            <i class="bi bi-person-exclamation"></i>
                        </div>

                        <div class="info-card-dashboard">
                            <span class="title-info-card">Clientes pedentes</span>
                            <span class="number-card">0</span>
                        </div>
                    </div>
                </div>
                <!--DIV DE CONTAINER DOS GRAFICOS-->
                <div class="container-graficos">
                    <div id="grafico1">
                        <span>Generos Disponiveis</span>
                        <canvas id="grafico-generos-disponiveis"></canvas>
                    </div>

                    <div id="grafico2">
                        <span>Generos Alugados</span>
                        <canvas id="grafico-generos-alugados"></canvas>
                    </div>
                </div>
                
                
            </section>
            <!--TELA DE CADASTRO E LISTA DE LIVROS-->
            <section id="telaLivros" class="hidden">
                Livros
            </section>
            <!--TELA DE CADASTRO E LISTA DE CLIENTES-->
            <section id="telaClientes" class="hidden">
                Clientes
            </section>
            <!--TELA DE CONFIGURAÇÃO-->
            <section id="telaConfiguracao" class="hidden">
                Configurações
            </section>
        </main>
    </div>

















    <!--LOGICA DE FUNCIONABILIDADE GERAL DO SISTEMA-->
    <script src="js/main.js"></script>
    <!--SCRIPT DO GRAFICO GENEROS DISPONIVEIS-->
    <script src="js/generosDisponiveis.js"></script>
    <!--SCRIPT DO GRAFICO GENEROS ALUGADOS-->
    <script src="js/generosAlugados.js"></script>
</body>
</html>
